<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-blue-100 min-h-screen text-gray-800 font-sans p-4 sm:p-8 antialiased">
    <div class="max-w-2xl mx-auto animate-fade-in">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 tracking-tight drop-shadow-sm pb-1">Task Manager</h1>
            <p class="text-gray-500 mt-1 font-medium">Keep track of your daily goals</p>
        </header>

        <section class="bg-white/95 rounded-2xl shadow-xl border border-white/40 p-6 sm:p-8 mb-8 relative overflow-hidden backdrop-blur-xl">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-purple-500"></div>
            <form id="task-form" class="space-y-5">
                <input type="hidden" id="edit-task-id">
                <div>
                    <label for="title" class="block text-sm font-semibold text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
                    <input type="text" id="title" name="title" required placeholder="What needs to be done?" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white shadow-sm">
                </div>
                <div>
                    <label for="description" class="block text-sm font-semibold text-gray-700 mb-1">Description <span class="text-gray-400 font-normal">(optional)</span></label>
                    <textarea id="description" name="description" placeholder="Additional details..." rows="3"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white shadow-sm resize-y"></textarea>
                </div>
                <div class="flex gap-4 pt-2">
                    <button type="submit" id="submit-btn" 
                        class="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 text-white font-bold py-3 px-6 rounded-xl shadow-md shadow-blue-500/30 hover:shadow-lg hover:shadow-blue-500/40 hover:-translate-y-0.5 active:scale-95 transition-all">
                        Add Task
                    </button>
                    <button type="button" id="cancel-edit-btn" 
                        class="hidden flex-1 bg-gray-100 text-gray-700 font-bold py-3 px-6 rounded-xl hover:bg-gray-200 focus:ring-2 focus:ring-gray-300 active:scale-95 transition-all">
                        Cancel Edit
                    </button>
                </div>
            </form>
            <div id="form-error" class="hidden font-medium text-red-500 mt-4 text-center text-sm bg-red-50 border border-red-100 p-3 rounded-xl shadow-inner"></div>
        </section>
        
        <div class="flex flex-wrap justify-center gap-2 mb-6" id="filters-container">
            <button id="filter-all" class="filter-btn px-5 py-2.5 rounded-full font-semibold text-sm transition-all bg-blue-600 text-white shadow-md hover:shadow-lg hover:-translate-y-0.5 active:scale-95 active-filter">All Tasks</button>
            <button id="filter-pending" class="filter-btn px-5 py-2.5 rounded-full font-semibold text-sm transition-all bg-white text-gray-600 hover:text-gray-900 border border-gray-200 shadow-sm hover:shadow active:scale-95">Pending</button>
            <button id="filter-done" class="filter-btn px-5 py-2.5 rounded-full font-semibold text-sm transition-all bg-white text-gray-600 hover:text-gray-900 border border-gray-200 shadow-sm hover:shadow active:scale-95">Done</button>
            
            <div class="w-px h-8 bg-gray-300 mx-2 self-center hidden sm:block"></div>
            
            <button id="sort-date" class="sort-btn px-5 py-2.5 rounded-full font-semibold text-sm transition-all bg-white text-gray-600 hover:text-gray-900 border border-gray-200 shadow-sm flex items-center gap-1.5 hover:shadow active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" /></svg>
                Sort: Newest
            </button>
        </div>

        <div id="loading" class="hidden text-center py-10 animate-fade-in">
             <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500/30 border-t-blue-600 shadow-sm"></div>
             <p class="mt-3 text-blue-600 font-semibold tracking-wide text-sm uppercase">Updating tasks...</p>
        </div>

        <section class="task-list-section">
            <ul id="task-list" class="space-y-4"></ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
